name: validate-pr

# Runs the full build → validate on every PR that could affect output.
# Does NOT publish to Hugging Face. Uploads the built dist/ as a PR artifact
# so reviewers can inspect.

on:
  pull_request:
    paths:
      - "src/**"
      - "pyproject.toml"
      - "DATASET_CARD.md.tmpl"
      - "gold/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install project
        run: uv sync

      - name: Build (EN only — fast PR check)
        run: uv run eu-ai-act-dataset build --output dist --lang en --verbose

      - name: Validate
        run: uv run eu-ai-act-dataset validate dist --verbose

      - name: Upload artifact for reviewer inspection
        uses: actions/upload-artifact@v4
        with:
          name: dataset-pr-${{ github.event.pull_request.number }}
          path: dist/
          retention-days: 7
